<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ブラック占い館 | ミス・ノクターンの占い自動作文マシン</title>
  <style>
    /* =========================================================
       ブラック占い館
       - 1ファイル完結
       - 外部API/外部画像/外部ライブラリ不使用
       - 文章パーツは下部 JavaScript の FORTUNE_PARTS にまとめています
       ========================================================= */

    :root {
      --ink: #2b1530;
      --night: #160c22;
      --night-2: #251235;
      --purple: #5c2f72;
      --wine: #8f3158;
      --pink: #d98aaa;
      --cream: #f6e6c9;
      --paper: #f4dfbd;
      --paper-2: #ead0a7;
      --gold: #d7a45b;
      --gold-dark: #8d6231;
      --shadow: rgba(10, 5, 16, 0.45);
      --soft-shadow: rgba(47, 19, 49, 0.22);
      --radius: 18px;
      --serif: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", Georgia, serif;
      --sans: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--night);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--cream);
      font-family: var(--sans);
      background:
        radial-gradient(circle at 80% 12%, rgba(217, 138, 170, 0.2) 0 10%, transparent 26%),
        radial-gradient(circle at 18% 20%, rgba(215, 164, 91, 0.13) 0 7%, transparent 24%),
        linear-gradient(120deg, rgba(26, 11, 35, 0.55), rgba(69, 25, 56, 0.28)),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 92px),
        linear-gradient(180deg, #130b20 0%, #2a1237 58%, #160c22 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        radial-gradient(circle, rgba(255, 226, 170, 0.9) 0 1px, transparent 2px),
        radial-gradient(circle, rgba(217, 138, 170, 0.7) 0 1px, transparent 2px);
      background-size: 93px 89px, 141px 137px;
      background-position: 12px 18px, 71px 42px;
      opacity: 0.5;
      animation: starDrift 16s linear infinite;
    }

    body::after {
      background:
        radial-gradient(ellipse at top left, rgba(0,0,0,0.38), transparent 38%),
        radial-gradient(ellipse at bottom right, rgba(0,0,0,0.42), transparent 42%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 46px;
    }

    .curtain {
      position: fixed;
      top: 0;
      bottom: 0;
      width: min(12vw, 130px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.72;
      filter: drop-shadow(0 14px 20px rgba(0,0,0,0.36));
    }

    .curtain.left {
      left: 0;
      background:
        radial-gradient(circle at 80% 14%, rgba(246, 205, 141, 0.18), transparent 16%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 7px, transparent 7px 20px),
        linear-gradient(100deg, #441735 0%, #7c2d57 62%, transparent 100%);
      clip-path: polygon(0 0, 100% 0, 72% 100%, 0 100%);
    }

    .curtain.right {
      right: 0;
      background:
        radial-gradient(circle at 22% 18%, rgba(246, 205, 141, 0.16), transparent 16%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 7px, transparent 7px 20px),
        linear-gradient(260deg, #441735 0%, #7c2d57 62%, transparent 100%);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 28% 100%);
    }

    .site-header {
      margin-bottom: 18px;
      text-align: center;
    }

    .brand-kicker {
      color: var(--gold);
      font-family: var(--serif);
      font-size: clamp(15px, 2vw, 20px);
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(0,0,0,0.25);
    }

    h1 {
      margin: 4px 0 0;
      font-family: var(--serif);
      font-size: clamp(36px, 7vw, 72px);
      line-height: 1.02;
      letter-spacing: 0;
      color: #ffd997;
      text-shadow: 0 4px 0 rgba(96, 35, 66, 0.75), 0 0 22px rgba(236, 170, 92, 0.25);
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(320px, 470px) 1fr;
      gap: 24px;
      align-items: stretch;
    }

    .paper-panel,
    .result-score,
    .fortune-card,
    .summary-card {
      color: var(--ink);
      border-radius: var(--radius);
      border: 2px solid var(--gold-dark);
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.48), transparent 24%),
        radial-gradient(circle at 90% 82%, rgba(141, 98, 49, 0.12), transparent 28%),
        repeating-linear-gradient(45deg, rgba(111, 72, 35, 0.025) 0 2px, transparent 2px 9px),
        linear-gradient(135deg, var(--paper), #f8e9ca 48%, var(--paper-2));
      box-shadow:
        0 22px 40px var(--shadow),
        inset 0 0 0 4px rgba(255, 244, 220, 0.45),
        inset 0 0 0 7px rgba(139, 95, 43, 0.16);
    }

    .paper-panel {
      padding: 24px;
      min-height: 100%;
      position: relative;
    }

    .paper-panel::before,
    .paper-panel::after,
    .fortune-card::before,
    .fortune-card::after,
    .summary-card::before,
    .summary-card::after {
      content: "✦";
      position: absolute;
      color: rgba(141, 98, 49, 0.42);
      font-size: 20px;
    }

    .paper-panel::before,
    .fortune-card::before,
    .summary-card::before {
      top: 12px;
      left: 14px;
    }

    .paper-panel::after,
    .fortune-card::after,
    .summary-card::after {
      right: 14px;
      bottom: 12px;
    }

    .paper-panel h2,
    .results h2 {
      margin: 0;
      font-family: var(--serif);
      text-align: center;
      color: #5a253b;
      letter-spacing: 0;
    }

    .form-grid {
      display: grid;
      gap: 17px;
      margin-top: 24px;
    }

    .field {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 14px;
      align-items: center;
    }

    .field label,
    .choice-label {
      color: #4b2432;
      font-weight: 700;
    }

    input[type="number"],
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(89, 41, 51, 0.28);
      border-radius: 8px;
      padding: 9px 12px;
      color: #3b1d28;
      background: rgba(255, 249, 236, 0.72);
      box-shadow: inset 0 2px 4px rgba(60, 31, 36, 0.08);
      outline: none;
    }

    input[type="number"]:focus,
    select:focus {
      border-color: var(--wine);
      box-shadow: 0 0 0 4px rgba(143, 49, 88, 0.18);
    }

    .choice-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .choice-row input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .choice-row span {
      display: inline-grid;
      min-height: 38px;
      place-items: center;
      padding: 8px 13px;
      border: 1px solid rgba(89, 41, 51, 0.28);
      border-radius: 8px;
      color: #5a2739;
      background: rgba(255, 249, 236, 0.52);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .choice-row input:checked + span {
      color: #fff5dc;
      background: linear-gradient(135deg, var(--wine), var(--purple));
      border-color: rgba(255, 226, 173, 0.8);
      box-shadow: 0 6px 14px rgba(94, 45, 92, 0.25);
      transform: translateY(-1px);
    }

    .error-message {
      min-height: 22px;
      color: #852442;
      font-weight: 700;
      line-height: 1.5;
    }

    .primary-button,
    .again-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 56px;
      border: 1px solid rgba(255, 226, 173, 0.86);
      border-radius: 12px;
      color: #fff6da;
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent) -120% 0 / 70% 100% no-repeat,
        linear-gradient(135deg, #88335a, #5c2d73 58%, #9b3e66);
      box-shadow: 0 12px 0 #6c2f47, 0 18px 28px rgba(47, 19, 49, 0.32);
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 0;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background-position 0.7s ease;
    }

    .primary-button:hover,
    .again-button:hover {
      background-position: 180% 0;
      transform: translateY(-2px);
      box-shadow: 0 14px 0 #6c2f47, 0 22px 32px rgba(47, 19, 49, 0.36);
    }

    .primary-button:active,
    .again-button:active {
      transform: translateY(4px);
      box-shadow: 0 6px 0 #6c2f47, 0 12px 18px rgba(47, 19, 49, 0.28);
    }

    .stage {
      min-height: 580px;
      position: relative;
      border: 1px solid rgba(215, 164, 91, 0.55);
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at 48% 37%, rgba(159, 69, 163, 0.24), transparent 25%),
        radial-gradient(circle at 63% 18%, rgba(238, 204, 139, 0.16), transparent 18%),
        linear-gradient(160deg, rgba(20, 9, 31, 0.72), rgba(62, 25, 65, 0.66));
      box-shadow: 0 24px 46px rgba(0,0,0,0.34), inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .moon {
      position: absolute;
      top: 38px;
      right: 17%;
      width: 134px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #ead0a7;
      opacity: 0.34;
      box-shadow: 0 0 45px rgba(255, 223, 166, 0.18);
    }

    .moon::after {
      content: "";
      position: absolute;
      inset: -4px 20px -4px -18px;
      border-radius: 50%;
      background: #1e112c;
    }

    .shelf {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 38px;
      height: 26px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,0,0,0.38), transparent 68%);
    }

    .speech {
      position: absolute;
      left: 36px;
      top: 50px;
      width: min(260px, 42%);
      padding: 18px 18px 20px;
      border-radius: 50% 48% 52% 45%;
      color: #512236;
      background: #f8e9d0;
      box-shadow: 0 10px 18px rgba(0,0,0,0.22);
      font-weight: 800;
      line-height: 1.7;
      z-index: 4;
    }

    .speech::after {
      content: "";
      position: absolute;
      right: -14px;
      bottom: 18px;
      width: 30px;
      height: 26px;
      background: #f8e9d0;
      clip-path: polygon(0 0, 100% 46%, 0 100%);
    }

    .hero-visual {
      position: absolute;
      right: clamp(8px, 4vw, 46px);
      bottom: 0;
      width: min(620px, 86%);
      z-index: 2;
      filter: drop-shadow(0 22px 34px rgba(0,0,0,0.42));
      transform-origin: center bottom;
      animation: floaty 4.5s ease-in-out infinite;
    }

    .fortune-image {
      display: block;
      width: 100%;
      height: auto;
      max-height: 610px;
      object-fit: contain;
      object-position: center bottom;
    }

    .status-badge {
      position: absolute;
      left: clamp(22px, 7vw, 72px);
      bottom: 58px;
      z-index: 5;
      min-width: 128px;
      padding: 13px 18px;
      border: 1px solid rgba(255, 223, 167, 0.72);
      border-radius: 999px;
      color: #fff3d0;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.34), transparent 20%),
        linear-gradient(135deg, rgba(132, 53, 132, 0.82), rgba(53, 22, 74, 0.88));
      box-shadow: 0 0 30px rgba(214, 89, 207, 0.42), inset 0 0 18px rgba(255,255,255,0.11);
      font-weight: 900;
      text-align: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.42);
    }

    .stage.is-reading .status-badge {
      animation: statusPulse 0.9s ease-in-out infinite;
    }

    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 20;
    }

    .spark {
      position: absolute;
      width: 8px;
      height: 8px;
      color: #ffd98d;
      animation: sparklePop 900ms ease-out forwards;
      text-shadow: 0 0 12px rgba(217,138,170,0.8);
    }

    .results {
      margin-top: 26px;
    }

    .results[hidden] {
      display: none;
    }

    .results-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #ffd997;
      font-family: var(--serif);
      font-size: clamp(28px, 5vw, 44px);
      text-shadow: 0 3px 0 rgba(96, 35, 66, 0.7);
      margin: 10px 0 22px;
    }

    .results-title::before,
    .results-title::after {
      content: "";
      width: min(140px, 18vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .results-layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .result-score {
      position: relative;
      min-height: 220px;
      display: grid;
      align-content: center;
      justify-items: center;
      padding: 18px 14px;
      text-align: center;
    }

    .score-caption {
      color: #5a253b;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .score-value {
      font-family: Georgia, var(--serif);
      color: #48203a;
      font-size: 48px;
      line-height: 1;
      font-weight: 900;
    }

    .score-value small {
      color: #6d3c51;
      font-size: 20px;
    }

    .score-label {
      margin: 14px 0 8px;
      min-width: 118px;
      padding: 6px 14px;
      color: #fff3dc;
      background: linear-gradient(135deg, #6e2d4b, #a54367);
      border: 1px solid rgba(255, 223, 167, 0.7);
      border-radius: 6px;
      box-shadow: 0 5px 0 rgba(87, 42, 57, 0.35);
      font-weight: 900;
      font-size: 20px;
    }

    .score-note {
      color: #61384a;
      font-weight: 700;
      line-height: 1.7;
      font-size: 13px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .fortune-card,
    .summary-card {
      position: relative;
      min-height: 186px;
      padding: 20px;
      overflow: hidden;
      transform-origin: center top;
      animation: cardFlip 520ms ease both;
    }

    .fortune-card:nth-child(2n) {
      animation-delay: 80ms;
    }

    .fortune-card:nth-child(3n) {
      animation-delay: 140ms;
    }

    .fortune-card h3,
    .summary-card h3 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 12px;
      padding-bottom: 9px;
      color: #4f2137;
      font-family: var(--serif);
      font-size: 24px;
      border-bottom: 1px solid rgba(95, 47, 61, 0.2);
    }

    .card-icon {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(143, 49, 88, 0.12);
      border: 1px solid rgba(141, 98, 49, 0.32);
      font-size: 20px;
    }

    .fortune-card p,
    .summary-card p {
      margin: 0;
      color: #35202a;
      line-height: 1.85;
      font-weight: 650;
    }

    .luck-stars {
      display: flex;
      gap: 3px;
      margin-top: 15px;
      color: #6b3157;
      font-size: 16px;
    }

    .luck-stars .dim {
      color: rgba(83, 42, 61, 0.28);
    }

    .wide-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .summary-card {
      margin-top: 16px;
      min-height: 132px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    .summary-card .again-button {
      width: auto;
      min-width: 190px;
      padding-inline: 24px;
    }

    .share-note {
      margin-top: 14px;
      color: #e5c692;
      text-align: center;
      font-size: 13px;
      opacity: 0.86;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }

    @keyframes starDrift {
      from { background-position: 12px 18px, 71px 42px; }
      to { background-position: 105px 107px, 212px 179px; }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-0.4deg); }
      50% { transform: translateY(-8px) rotate(0.5deg); }
    }

    @keyframes statusPulse {
      0%, 100% { box-shadow: 0 0 30px rgba(214, 89, 207, 0.42), inset 0 0 18px rgba(255,255,255,0.11); }
      50% { box-shadow: 0 0 64px rgba(255, 210, 130, 0.62), 0 0 98px rgba(218, 91, 209, 0.35), inset 0 0 20px rgba(255,255,255,0.18); }
    }

    @keyframes sparklePop {
      0% { transform: translateY(0) scale(0.35) rotate(0deg); opacity: 0; }
      18% { opacity: 1; }
      100% { transform: translateY(-86px) scale(1.25) rotate(160deg); opacity: 0; }
    }

    @keyframes cardFlip {
      from { opacity: 0; transform: rotateX(-14deg) translateY(18px); }
      to { opacity: 1; transform: rotateX(0deg) translateY(0); }
    }

    @media (max-width: 920px) {
      .site-header {
        grid-template-columns: 1fr;
      }

      .shell {
        display: flex;
        flex-direction: column;
      }

      .stage {
        order: 1;
        min-height: 620px;
      }

      .paper-panel {
        order: 2;
      }

      .hero-visual {
        left: 50%;
        right: auto;
        width: min(500px, 94%);
        animation: none;
        transform: translateX(-50%);
      }

      .speech {
        width: min(270px, 48%);
      }

      .results-layout {
        grid-template-columns: 1fr;
      }

      .result-score {
        min-height: auto;
      }
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 20px, 520px);
        padding-top: 20px;
      }

      .curtain {
        width: 34px;
        opacity: 0.5;
      }

      .brand-kicker,
      h1 {
        text-align: center;
      }

      .stage {
        min-height: 560px;
        border-radius: 18px;
      }

      .speech {
        left: 18px;
        top: 22px;
        width: 64%;
        padding: 14px 15px;
        font-size: 13px;
      }

      .hero-visual {
        left: 50%;
        right: auto;
        width: min(480px, 100%);
        transform: translateX(-50%);
      }

      .fortune-image {
        max-height: 500px;
        margin-inline: auto;
      }

      .status-badge {
        left: 18px;
        bottom: 30px;
      }

      .paper-panel {
        padding: 21px 16px;
      }

      .field {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .choice-row span {
        flex: 1 1 auto;
        min-width: 66px;
      }

      .cards-grid,
      .wide-grid {
        grid-template-columns: 1fr;
      }

      .summary-card {
        grid-template-columns: 1fr;
      }

      .summary-card .again-button {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .stage {
        min-height: 500px;
      }

      .speech {
        width: 74%;
      }

      .fortune-image {
        max-height: 450px;
      }

      .fortune-card h3,
      .summary-card h3 {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <div class="curtain left" aria-hidden="true"></div>
  <div class="curtain right" aria-hidden="true"></div>
  <div class="sparkles" id="sparkles" aria-hidden="true"></div>

  <main class="page">
    <header class="site-header">
      <div>
        <div class="brand-kicker">予約の取れない魔女占い</div>
        <h1>Witch, Please.</h1>
      </div>
    </header>

    <section class="shell" aria-label="占い入力">
      <form class="paper-panel" id="fortuneForm" novalidate>
        <h2>あなたの情報を教えてね</h2>
        <div class="form-grid">
          <div class="field">
            <label for="age">年齢</label>
            <div>
              <input id="age" name="age" type="number" min="1" max="120" inputmode="numeric" placeholder="28" required>
            </div>
          </div>

          <div class="field">
            <div class="choice-label">性別</div>
            <div class="choice-row" role="radiogroup" aria-label="性別">
              <label><input type="radio" name="gender" value="女性" checked><span>女性</span></label>
              <label><input type="radio" name="gender" value="男性"><span>男性</span></label>
              <label><input type="radio" name="gender" value="その他"><span>その他</span></label>
              <label><input type="radio" name="gender" value="秘密"><span>秘密♡</span></label>
            </div>
          </div>

          <div class="field">
            <label for="zodiac">星座</label>
            <select id="zodiac" name="zodiac" required>
              <option value="">選んでね</option>
              <option value="牡羊座">牡羊座</option>
              <option value="牡牛座">牡牛座</option>
              <option value="双子座">双子座</option>
              <option value="蟹座">蟹座</option>

    }

    function getAgeTag(age) {
      if (age <= 29) return "age-young";
      if (age <= 54) return "age-middle";
      return "age-senior";
    }

    function getBloodTag(blood) {
      return {
        A: "blood-a",
        B: "blood-b",
        O: "blood-o",
        AB: "blood-ab",
        "不明": "blood-unknown"
      }[blood] || "blood-unknown";
    }

    function runFortune(profile) {
      stage.classList.add("is-reading");
      speech.textContent = NOCTURNE.lines.reading;
      statusBadge.textContent = "解析中…";
      createSparkles(30);

      window.setTimeout(() => {
        const fortune = generateFortune(profile);
        renderFortune(fortune);
        stage.classList.remove("is-reading");
        statusBadge.textContent = fortune.scoreLabel;
        speech.textContent = fortune.score >= 76 ? NOCTURNE.lines.good : fortune.score <= 35 ? NOCTURNE.lines.bad : NOCTURNE.lines.result;
        createSparkles(48);
        results.hidden = false;
        results.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 650);
    }

    /* =========================================================
       生成ロジック
       入力内容のタグに合う文章が少し出やすくなる軽い重み付け。
       同じ人が同じ日に何度押しても変わるよう、完全固定にはしません。
       ========================================================= */
    function generateFortune(profile) {
      const selected = {};
      const usedTexts = new Set();

      [...CATEGORY_META, ...ACTION_META, { key: "summary" }].forEach((category) => {
        selected[category.key] = pickWeightedPart(category.key, profile, usedTexts).text;
      });

      const score = calculateScore(profile);
      const scoreInfo = SCORE_NOTES.find((item) => score >= item.min);

      lastResults = {
        profile,
        score,
        scoreLabel: scoreInfo.label,
        scoreNote: scoreInfo.note,
        texts: selected
      };

      return lastResults;
    }

    function pickWeightedPart(categoryKey, profile, usedTexts) {
      const parts = FORTUNE_PARTS[categoryKey];
      const weighted = [];
      const contextTags = [
        profile.ageTag,
        profile.elementTag,
        profile.bloodTag,
        "calm"
      ];

      parts.forEach((part) => {
        let weight = 1;
        contextTags.forEach((tag) => {
          if (part.tags.includes(tag)) weight += 2;
        });
        if (usedTexts.has(part.text)) weight = Math.max(1, weight - 4);
        for (let index = 0; index < weight; index += 1) weighted.push(part);
      });

      const chosen = weighted[Math.floor(Math.random() * weighted.length)] || parts[0];
      usedTexts.add(chosen.text);
      return chosen;
    }

    function calculateScore(profile) {
      const base = Math.floor(Math.random() * 65) + 18;
      const zodiacBonus = profile.elementTag === "fire" ? 7 : profile.elementTag === "earth" ? 4 : profile.elementTag === "air" ? 5 : 3;
      const ageNoise = profile.ageTag === "age-young" ? randomBetween(-7, 10) : profile.ageTag === "age-middle" ? randomBetween(-5, 8) : randomBetween(-4, 9);
      const bloodNoise = {
        "blood-a": randomBetween(-3, 7),
        "blood-b": randomBetween(-6, 9),
        "blood-o": randomBetween(-4, 8),
        "blood-ab": randomBetween(-7, 10),
        "blood-unknown": randomBetween(-2, 6)
      }[profile.bloodTag] || 0;

      return clamp(base + zodiacBonus + ageNoise + bloodNoise, 1, 100);
    }

    function randomBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    /* =========================================================
       UI描画
       結果カードやスコア表示をここで更新します。
       ========================================================= */
    function renderFortune(fortune) {
      scoreValue.textContent = fortune.score;
      scoreLabel.textContent = fortune.scoreLabel;
      scoreNote.textContent = fortune.scoreNote;

      mainCards.innerHTML = CATEGORY_META.map((meta) => {
        const stars = renderStars(fortune.score, meta.key);
        return `
          <article class="fortune-card">
            <h3><span class="card-icon">${meta.icon}</span>${meta.title}</h3>
            <p>${escapeHtml(fortune.texts[meta.key])}</p>
            <div class="luck-stars" aria-label="ラッキー度">${stars}</div>
          </article>
        `;
      }).join("");

      actionCards.innerHTML = ACTION_META.map((meta) => `
        <article class="fortune-card">
          <h3><span class="card-icon">${meta.icon}</span>${meta.title}</h3>
          <p>${escapeHtml(fortune.texts[meta.key])}</p>
        </article>
      `).join("");

      summaryText.textContent = fortune.texts.summary;
    }

    function renderStars(score, key) {
      const offsets = { overall: 0, work: -8, love: 4, money: -3 };
      const starCount = clamp(Math.ceil((score + (offsets[key] || 0)) / 20), 1, 5);
      return Array.from({ length: 5 }, (_, index) => {
        const className = index < starCount ? "" : " class=\"dim\"";
        return `<span${className}>★</span>`;
      }).join("");
    }

    function createSparkles(count) {
      for (let index = 0; index < count; index += 1) {
        const spark = document.createElement("span");
        spark.className = "spark";
        spark.textContent = Math.random() > 0.55 ? "✦" : "✧";
        spark.style.left = `${randomBetween(8, 92)}vw`;
        spark.style.top = `${randomBetween(18, 82)}vh`;
        spark.style.animationDelay = `${Math.random() * 260}ms`;
        spark.style.fontSize = `${randomBetween(12, 26)}px`;
        sparkles.appendChild(spark);
        window.setTimeout(() => spark.remove(), 1200);
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
